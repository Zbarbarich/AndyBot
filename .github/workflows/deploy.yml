# Deploy to Oracle (or other) VPS on push to main.
# Build runs on the VPS to avoid a container registry.
# Required secrets: SSH_HOST, SSH_USER, SSH_PRIVATE_KEY
# Optional: DEPLOY_PATH (absolute path on VPS, e.g. /home/opc/theNineteenthChamber)

name: Deploy to VPS

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            set -e
            if [ -n "$DEPLOY_PATH" ]; then
              cd "$DEPLOY_PATH"
            else
              cd ~/theNineteenthChamber
            fi
            git fetch origin && git reset --hard origin/main
            docker compose -f deploy/docker-compose.yml --env-file deploy/.env build --no-cache
            docker compose -f deploy/docker-compose.yml --env-file deploy/.env up -d
            docker image prune -f
        env:
          DEPLOY_PATH: ${{ secrets.DEPLOY_PATH }}
