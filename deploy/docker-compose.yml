# The Nineteenth Chamber — single-instance deployment
# Run from repo root: docker compose -f deploy/docker-compose.yml --env-file deploy/.env up -d --build
# Replace yourdomain.com in deploy/Caddyfile with your real domain before first run.

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB:-the_nineteenth_chamber}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB:-the_nineteenth_chamber}"]
      interval: 5s
      timeout: 5s
      retries: 5

  auth-service:
    build:
      context: ../backend/auth-service
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file: .env
    environment:
      PORT: 3001
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: ${POSTGRES_DB:-the_nineteenth_chamber}
      DB_USER: ${POSTGRES_USER}
      DB_PASSWORD: ${POSTGRES_PASSWORD}
      DB_SSL: "false"
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-1h}
      NODE_ENV: production
    depends_on:
      postgres:
        condition: service_healthy

  customer-service:
    build:
      context: ../backend/customer-service
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file: .env
    environment:
      PORT: 3003
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: ${POSTGRES_DB:-the_nineteenth_chamber}
      DB_USER: ${POSTGRES_USER}
      DB_PASSWORD: ${POSTGRES_PASSWORD}
      DB_SSL: "false"
      NODE_ENV: production
    depends_on:
      postgres:
        condition: service_healthy

  ticket-service:
    build:
      context: ../backend/ticket-service
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file: .env
    environment:
      PORT: 3004
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: ${POSTGRES_DB:-the_nineteenth_chamber}
      DB_USER: ${POSTGRES_USER}
      DB_PASSWORD: ${POSTGRES_PASSWORD}
      DB_SSL: "false"
      NODE_ENV: production
    depends_on:
      postgres:
        condition: service_healthy

  order-service:
    build:
      context: ../backend/order-service
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file: .env
    environment:
      PORT: 3005
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: ${POSTGRES_DB:-the_nineteenth_chamber}
      DB_USER: ${POSTGRES_USER}
      DB_PASSWORD: ${POSTGRES_PASSWORD}
      DB_SSL: "false"
      NODE_ENV: production
    depends_on:
      postgres:
        condition: service_healthy

  invoice-service:
    build:
      context: ../backend/invoice-service
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file: .env
    environment:
      PORT: 3006
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: ${POSTGRES_DB:-the_nineteenth_chamber}
      DB_USER: ${POSTGRES_USER}
      DB_PASSWORD: ${POSTGRES_PASSWORD}
      DB_SSL: "false"
      NODE_ENV: production
    depends_on:
      postgres:
        condition: service_healthy

  pdf-service:
    build:
      context: ../backend/pdf-service
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file: .env
    environment:
      PORT: 3007
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: ${POSTGRES_DB:-the_nineteenth_chamber}
      DB_USER: ${POSTGRES_USER}
      DB_PASSWORD: ${POSTGRES_PASSWORD}
      DB_SSL: "false"
      NODE_ENV: production
      COMPANY_NAME: ${COMPANY_NAME:-}
      COMPANY_LOGO_URL: ${COMPANY_LOGO_URL:-}
    depends_on:
      postgres:
        condition: service_healthy

  api-gateway:
    build:
      context: ../backend/api-gateway
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file: .env
    environment:
      PORT: 3000
      AUTH_SERVICE_URL: http://auth-service:3001
      CUSTOMER_SERVICE_URL: http://customer-service:3003
      TICKET_SERVICE_URL: http://ticket-service:3004
      ORDER_SERVICE_URL: http://order-service:3005
      INVOICE_SERVICE_URL: http://invoice-service:3006
      PDF_SERVICE_URL: http://pdf-service:3007
      JWT_SECRET: ${JWT_SECRET}
      CORS_ORIGIN: ${CORS_ORIGIN:-}
    depends_on:
      - auth-service
      - customer-service
      - ticket-service
      - order-service
      - invoice-service
      - pdf-service

  frontend:
    build:
      context: ../frontend
      dockerfile: Dockerfile
    restart: unless-stopped
    # No env needed at runtime (API base is empty = same origin)

  caddy:
    image: caddy:alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
    depends_on:
      - frontend
      - api-gateway

volumes:
  postgres_data:
